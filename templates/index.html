<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; }
        .container { margin-top: 50px; }
        .card { border-radius: 15px; }
        .btn-custom { border-radius: 20px; }
    </style>
</head>

<body>

<div class="container">

    <div class="text-center mb-4">
        <h1 class="fw-bold text-primary">🚀 Smart Task Manager</h1>
        <p class="text-muted">Manage your tasks efficiently</p>
    </div>

    <div class="card shadow p-4 mb-4">
        <h4>Add Task</h4>
        <form action="/add" method="POST">
            <div class="row">
                <div class="col-md-9">
                    <input type="text" name="title" class="form-control" placeholder="Enter task" required>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-success w-100 btn-custom">Add</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card shadow p-4">
        <h4>Task List</h4>
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Task</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for task in tasks %}
                <tr>
                    <td>{{ task[0] }}</td>
                    <td>{{ task[1] }}</td>

                    <td>
                        {% if task[2] == 'Completed' %}
                            <span class="badge bg-success">Completed</span>
                        {% else %}
                            <span class="badge bg-warning text-dark">Pending</span>
                        {% endif %}
                    </td>

                    <td>
                        <a href="/complete/{{ task[0] }}" class="btn btn-primary btn-sm">Complete</a>
                        <a href="/delete/{{ task[0] }}" class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
